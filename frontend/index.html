<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CodeCoder</title>
    <!-- Preconnect to API — saves 1 RTT on first call -->
    <link rel="preconnect" href="https://api.codecoder.in" crossorigin />
    <link rel="dns-prefetch" href="https://challenges.cloudflare.com" />

    <!-- Self-hosted fonts (no Google Fonts round-trip). Preload Geist (primary UI font)
         for instant first paint; the rest stream in via the stylesheet below. -->
    <link rel="preload" as="font" type="font/woff2" href="/fonts/geist-latin.woff2" crossorigin />
    <link rel="stylesheet" href="/fonts/fonts.css" />

    <!-- Preload hero image — instant first paint above the fold -->
    <link rel="preload" as="image" href="/bg-hero-new.webp" fetchpriority="high" />

    <!-- Cloudflare Turnstile — loaded async, only used on auth/support forms -->
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
