        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

<body class="bg-surface-container-lowest text-on-surface min-h-screen flex items-center justify-center p-8">
<!-- Poster Container -->
<div class="relative w-full max-w-[480px] aspect-[4/5] border-panel-gap border-outline-variant overflow-hidden group shadow-2xl shadow-black/50">
<!-- Background Asset -->
<div class="absolute inset-0 w-full h-full">
<img alt="Background Texture" class="w-full h-full object-cover opacity-80 mix-blend-luminosity group-hover:scale-105 transition-transform duration-[2000ms] ease-out" src="https://lh3.googleusercontent.com/aida/AP1WRLv2pdB9wNBheXPMnCSgnKmoyuLDrba7Vin3Cas-r4_MeeIbJBn8-vNcb91kXEPWnCSgDLQVGMTVMLv0b-n_ibikyPmTC8EineXA5eQmV5lFX65HPFy8NcvZBUqdsEfgO3XlogBliYuZuv7j46IuZgQNP2CGsBir_qftyV_Jd3Ny5MwCW3Vj1OWMXqQ07u1cDs1KxBktR0Ezzz1FG62CTNlf9KraoIcVzEgfeQsic7z9bMaCP_a1Q2XaqvWE"/>
</div>
<!-- Glassmorphism Vignette / Depth Layers -->
<div class="absolute inset-0 bg-background/30 backdrop-blur-[4px]"></div>
<div class="absolute inset-0 bg-gradient-to-t from-background via-background/60 to-transparent"></div>
<div class="absolute inset-0 bg-gradient-to-b from-surface-container-lowest/80 via-transparent to-transparent h-1/3"></div>
<!-- Precision Grid Lines -->
<div class="absolute inset-0 pointer-events-none">
<div class="absolute left-8 top-0 bottom-0 w-panel-gap bg-outline-variant/30"></div>
<div class="absolute right-8 top-0 bottom-0 w-panel-gap bg-outline-variant/30"></div>
<div class="absolute top-8 left-0 right-0 h-panel-gap bg-outline-variant/30"></div>
<div class="absolute bottom-8 left-0 right-0 h-panel-gap bg-outline-variant/30"></div>
</div>
<!-- Content Canvas -->
<div class="relative z-10 flex flex-col h-full items-center justify-between p-12 text-center">
<!-- Top Section -->
<div class="mt-4">
<div class="inline-flex items-center justify-center border-panel-gap border-secondary/40 bg-surface-container-lowest/60 backdrop-blur-[12px] px-6 py-3">
<span class="font-label-caps text-label-caps text-on-surface-variant tracking-[0.2em] uppercase">Achievement Unlocked</span>
</div>
</div>
<!-- Center Section -->
<div class="flex flex-col items-center justify-center flex-grow -mt-8">
<!-- Decorative Top Bracket -->
<div class="flex items-center gap-4 mb-8 opacity-60">
<div class="h-panel-gap w-8 bg-secondary"></div>
<span class="font-code-sm text-code-sm text-secondary">TIER: BEGINNER</span>
<div class="h-panel-gap w-8 bg-secondary"></div>
</div>
<!-- Main Title -->
<h1 class="font-display-lg text-display-lg text-inverse-surface mb-6 drop-shadow-lg">Hello World</h1>
<!-- Points Element -->
<div class="relative mb-10 group-hover:scale-105 transition-transform duration-700 ease-out">
<div class="absolute -inset-4 bg-secondary/10 blur-xl rounded-full"></div>
<span class="relative font-headline-md text-headline-md text-secondary tracking-wide">50 POINTS</span>
</div>
<!-- Description -->
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-[85%] leading-relaxed">
                    Every great developer starts with a single line of code. Your journey has officially begun.
                </p>
</div>
<!-- Bottom Section -->
<div class="mb-2 flex flex-col items-center">
<div class="w-12 h-panel-gap bg-outline-variant mb-6"></div>
<span class="font-headline-md text-headline-md text-on-surface opacity-40 italic tracking-widest">CodeCoder</span>
</div>
</div>
<!-- Corner Accents (Architectural Noir) -->
<div class="absolute top-0 left-0 w-8 h-8 border-t-[2px] border-l-[2px] border-secondary/60"></div>
<div class="absolute top-0 right-0 w-8 h-8 border-t-[2px] border-r-[2px] border-secondary/60"></div>
<div class="absolute bottom-0 left-0 w-8 h-8 border-b-[2px] border-l-[2px] border-secondary/60"></div>
<div class="absolute bottom-0 right-0 w-8 h-8 border-b-[2px] border-r-[2px] border-secondary/60"></div>
</div>
