spring.application.name=codecombat2026

# ─── Server ───────────────────────────────────────────────────────────────────
server.port=${SERVER_PORT:8080}

# Graceful shutdown
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# Request size limits
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# HTTP response compression (gzip) — cuts JSON payload by 60–80% over WAN
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/plain,text/css,application/javascript
server.compression.min-response-size=1024

# HTTP/2 (Tomcat) — multiplexed streams reduce per-request connection overhead.
# Safe even when nginx terminates TLS upstream over HTTP/1.1; nginx will still
# downgrade as needed. Has no negative effect.
server.http2.enabled=true

# Disable DevTools auto-restart — it destroys Valkey connections every 30s
# causing 6-7s delays on every request during restart cycle
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false

# ─── Database (Local PostgreSQL) ─────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:codecombat}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── HikariCP Connection Pool ─────────────────────────────────────────────────
spring.datasource.hikari.pool-name=CodeCombatPool
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=5000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.keepalive-time=60000

# ─── JPA / Hibernate ──────────────────────────────────────────────────────────
# Schema is owned by Flyway in production. ddl-auto=validate makes Hibernate
# refuse to start if entities and DB columns disagree — catches accidental
# entity changes that haven't been migrated.
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.cache.use_second_level_cache=false

# ─── Flyway ───────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
# baseline-on-migrate=true + baseline-version=1 means: when Flyway sees an
# existing schema with no flyway_schema_history table (i.e. the live DB that
# was created by ddl-auto=update before migrations existed), it stamps that
# DB as already at V1 and starts applying from V2 onward. Fresh installs
# (empty schema, no baseline triggered) run V1 from empty and then V2.
# Both paths converge on the same final schema.
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.baseline-description=Schema captured from ddl-auto=update production state
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=true

# ─── Security / JWT ───────────────────────────────────────────────────────────
codecombat.jwt.secret=${JWT_SECRET}
codecombat.jwt.expiration=${JWT_EXPIRATION:86400000}

# ─── Judge Service (Local ProcessBuilder) ────────────────────────────────────
# Code execution runs locally — no external VM needed
# Make sure javac, g++, gcc, python3, node are installed on this machine
codecombat.scheduler.pool-size=10
spring.docker.compose.enabled=false

# ─── Sandbox (bwrap + prlimit) ───────────────────────────────────────────────
# Required for any environment where user code runs. See SandboxRunner.java.
# These are env-only vars; defaults are baked into @Value annotations on
# SandboxRunner / SecurityConfig. Setting them here would create a circular
# placeholder reference (Spring would try to resolve SANDBOX_BWRAP_PATH from
# itself).

# ─── CORS ─────────────────────────────────────────────────────────────────────
# Comma-separated list of allowed frontend origins. No wildcards permitted.
# Defaulted in SecurityConfig.java; override via APP_ALLOWED_ORIGINS env var.

# ─── Valkey / Redis (Local) ───────────────────────────────────────────────────
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.username=${REDIS_USERNAME:}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.ssl.enabled=false
spring.data.redis.timeout=2000ms
spring.data.redis.lettuce.pool.max-active=20
spring.data.redis.lettuce.pool.max-idle=10
spring.data.redis.lettuce.pool.min-idle=5
spring.data.redis.lettuce.pool.max-wait=1000ms

# ─── Email — dual SMTP relay ──────────────────────────────────────────────────
# Two senders are configured in MailConfig.java:
#   noreplyMailSender (primary) → SendPulse → noreply@codecoder.in
#   supportMailSender           → Brevo     → support@codecoder.in
#
# Spring Boot's auto-configured JavaMailSender is disabled so MailConfig
# takes full control. Credentials come from env vars only.
# spring.mail.* properties below are deliberately commented out —
# MailConfig.java builds both senders manually and sets all SMTP props.
# Leaving them uncommented causes Spring Boot auto-config to create
# a second JavaMailSender that shadows the @Primary one and fails auth.
#spring.mail.host=smtp-pulse.com
#spring.mail.port=587
#spring.mail.username=${SENDPULSE_USERNAME:mandalpritam765@gmail.com}
#spring.mail.password=${SENDPULSE_PASSWORD}
#spring.mail.properties.mail.smtp.auth=true
#spring.mail.properties.mail.smtp.starttls.enable=true
#spring.mail.properties.mail.smtp.starttls.required=true
#spring.mail.properties.mail.smtp.connectiontimeout=8000
#spring.mail.properties.mail.smtp.timeout=8000
#spring.mail.properties.mail.smtp.writetimeout=8000

# ─── Actuator (Health Check) ──────────────────────────────────────────────────
management.endpoints.web.base-path=/api
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
# Skip both Redis and DB health checks — they add 500ms-3s per check
# Our /api/queue-status endpoint handles monitoring
management.health.redis.enabled=false
management.health.db.enabled=false
# Disk-space probe runs File.getUsableSpace() — on cheap ARM VM IO this
# blocks for ~1.9s on every health hit. Liveness only needs status=UP.
management.health.diskspace.enabled=false
management.health.ping.enabled=true
management.endpoint.health.probes.enabled=false
management.endpoint.health.cache.time-to-live=10s
management.server.port=${SERVER_PORT:8080}

# ─── Logging ──────────────────────────────────────────────────────────────────
# Production-safe defaults. Set LOG_LEVEL_APP=DEBUG temporarily for incident triage.
logging.level.root=WARN
logging.level.com.example.codecombat2026=${LOG_LEVEL_APP:WARN}
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=OFF
# Avoid logging request bodies & headers anywhere in the security chain
logging.level.org.springframework.web.filter=WARN
logging.pattern.console=%d{HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ─── Proctored Contest Mode ──────────────────────────────────────────────────
# 13 tunable keys from Req 20.1, surfaced via ProctoringConfig
# (com.example.codecombat2026.proctoring.config). Each key is overridable
# from the environment using the conventional Spring relaxed-binding rules
# (kebab-case here, SCREAMING_SNAKE_CASE in .env.production-vm).
proctoring.no-face-threshold-seconds=${PROCTORING_NO_FACE_THRESHOLD_SEC:5}
proctoring.ai-inference-interval-ms=${PROCTORING_AI_INFERENCE_INTERVAL_MS:1000}
proctoring.heartbeat-interval-seconds=${PROCTORING_HEARTBEAT_INTERVAL_SEC:15}
proctoring.heartbeat-timeout-seconds=${PROCTORING_HEARTBEAT_TIMEOUT_SEC:45}
proctoring.max-offline-seconds=${PROCTORING_MAX_OFFLINE_SEC:60}
proctoring.max-offline-events=${PROCTORING_MAX_OFFLINE_EVENTS:1000}
proctoring.max-event-bytes=${PROCTORING_MAX_EVENT_BYTES:4096}
proctoring.max-screenshot-bytes=${PROCTORING_MAX_SCREENSHOT_BYTES:262144}
proctoring.screenshot-max-width=${PROCTORING_SCREENSHOT_MAX_WIDTH:640}
proctoring.screenshot-max-height=${PROCTORING_SCREENSHOT_MAX_HEIGHT:480}
proctoring.screenshot-jpeg-quality=${PROCTORING_SCREENSHOT_JPEG_QUALITY:0.7}
proctoring.event-rate-limit-per-second=${PROCTORING_EVENT_RATE_PER_SEC:30}
proctoring.screenshot-rate-limit-per-minute=${PROCTORING_SCREENSHOT_RATE_PER_MIN:10}
